<script>
const App={data:null,state:{step:1,profile:{},selected:[],mode:'BENCHMARK',sessionId:null,currentInst:0,currentSection:0,answers:{},comments:{},visited:new Set()},
init(){google.script.run.withSuccessHandler(d=>{this.data=d;this.state.mode=d.config.mode||'BENCHMARK';const h=d.assets.CX_WELCOME;if(h)document.getElementById('heroMedia').style.backgroundImage=`url("${h.url}")`;}).withFailureHandler(this.fail).getBootstrap();},
start(){if(!this.data)return this.toast('Loading configuration…');document.getElementById('welcomeView').classList.add('hidden');document.getElementById('appView').classList.remove('hidden');this.renderProfile();},
setStep(n){this.state.step=n;document.querySelectorAll('.step').forEach(x=>x.classList.toggle('active',Number(x.dataset.step)===n));},
renderProfile(){this.setStep(1);const p=this.state.profile,o=this.data.profileOptions;document.getElementById('stage').innerHTML=`<div class="panel"><h2 class="section-title">Tell us about you</h2><p class="section-lead">Your profile helps interpret service-experience patterns. Contact details support follow-up only where you grant permission.</p><div class="form-grid">
${this.field('Name','name',p.name,'text',true)}${this.field('Email','email',p.email,'email',true)}${this.field('Phone','phone',p.phone,'tel',true)}${this.field('Age','age',p.age,'number',false)}
${this.select('Gender','gender',['','Female','Male','Other','Prefer not to say'],p.gender)}${this.select('Region','region',[''].concat(o.regions),p.region)}${this.field('Occupation','occupation',p.occupation,'text',false)}${this.select('Highest educational level','education',[''].concat(o.education),p.education)}${this.select('Monthly income band','incomeBand',[''].concat(o.incomeBands),p.incomeBand)}
<div class="field full"><label class="consent"><input id="consentFollowup" type="checkbox" ${p.consentFollowup?'checked':''}> I allow an authorised representative of the institution to contact me about my feedback.</label></div><div class="field full"><label class="consent"><input id="consentResearch" type="checkbox" ${p.consentResearch?'checked':''}> I consent to my responses being used in aggregated customer-experience analysis.</label><small>${this.esc(this.data.config.privacyText)}</small></div></div><div class="actions"><button class="btn btn-primary" onclick="App.captureProfile()">Continue</button></div></div>`;},
field(label,id,val,type,req){return `<div class="field"><label>${label}${req?' *':''}</label><input id="${id}" type="${type}" value="${this.esc(val||'')}" ${req?'required':''}></div>`},
select(label,id,opts,val){return `<div class="field"><label>${label}</label><select id="${id}">${opts.map(x=>`<option ${x===val?'selected':''}>${this.esc(x)}</option>`).join('')}</select></div>`},
captureProfile(){const ids=['name','email','phone','age','gender','region','occupation','education','incomeBand'];ids.forEach(id=>this.state.profile[id]=document.getElementById(id).value.trim());this.state.profile.consentFollowup=document.getElementById('consentFollowup').checked;this.state.profile.consentResearch=document.getElementById('consentResearch').checked;if(!this.state.profile.name||!this.state.profile.email||!this.state.profile.phone)return this.toast('Name, email and phone are required.');if(!this.state.profile.consentResearch)return this.toast('Consent to aggregated customer-experience analysis is required to continue.');this.renderInstitutions();},
renderInstitutions(){this.setStep(2);const selected=new Set(this.state.selected);document.getElementById('stage').innerHTML=`<div class="panel"><h2 class="section-title">Select institution${this.state.mode==='VALIDATION'?'':'s'}</h2><p class="section-lead">${this.state.mode==='VALIDATION'?'Select the one bank you consider your main bank.':'Select each bank you want to evaluate. You will complete the full instrument separately for every selected bank.'}</p>${this.state.mode!=='VALIDATION'?`<div class="notice" style="margin-bottom:18px">Multi-institution responses are suitable for operational benchmarking. For formal psychometric validation, use the one-main-bank mode or account statistically for repeated observations from the same respondent.</div>`:''}<div class="bank-grid">${this.data.institutions.map(b=>`<div class="bank-card ${selected.has(b.institutionId)?'selected':''}" onclick="App.toggleInstitution('${b.institutionId}')"><img class="bank-logo" src="${this.esc(b.logoUrl)}" onerror="this.style.visibility='hidden'"><strong>${this.esc(b.name)}</strong></div>`).join('')}</div>${this.state.mode!=='VALIDATION'&&this.state.selected.length?`<div class="field" style="margin-top:22px"><label>Which selected institution is your main bank?</label><select id="mainBankId" onchange="App.state.profile.mainBankId=this.value"><option value="">Select main bank</option>${this.state.selected.map(id=>{const b=this.data.institutions.find(x=>x.institutionId===id);return `<option value="${id}" ${this.state.profile.mainBankId===id?'selected':''}>${this.esc(b.name)}</option>`}).join('')}</select></div>`:''}<div class="actions"><button class="btn btn-secondary" onclick="App.renderProfile()">Back</button><button class="btn btn-primary" onclick="App.createSession()">Continue with ${this.state.selected.length||0}</button></div></div>`;},
toggleInstitution(id){const i=this.state.selected.indexOf(id);if(this.state.mode==='VALIDATION'){this.state.selected=[id];}else if(i>=0){this.state.selected.splice(i,1);if(this.state.profile.mainBankId===id)this.state.profile.mainBankId='';}else{if(this.state.selected.length>=this.data.config.maxInstitutions)return this.toast('Maximum '+this.data.config.maxInstitutions+' institutions per session.');this.state.selected.push(id);}this.renderInstitutions();},
createSession(){if(!this.state.selected.length)return this.toast('Select at least one institution.');if(this.state.mode!=='VALIDATION'&&!this.state.profile.mainBankId)return this.toast('Select your main bank from the institutions chosen.');google.script.run.withSuccessHandler(r=>{this.state.sessionId=r.sessionId;this.state.selected.forEach(id=>{this.state.answers[id]={};this.state.comments[id]={};});this.renderSurvey();}).withFailureHandler(this.fail).startSurvey(this.state.profile,this.state.selected,this.state.mode);},
renderSurvey(){this.setStep(3);const inst=this.getInst(),sec=this.getSection();this.state.visited.add(inst.institutionId);const asset=this.data.assets[sec.imageKey]||{};const complete=this.isInstitutionComplete(inst.institutionId);document.getElementById('stage').innerHTML=`<div class="inst-tabs">${this.state.selected.map((id,i)=>{const b=this.data.institutions.find(x=>x.institutionId===id);return `<button class="inst-tab ${i===this.state.currentInst?'active':''} ${this.isInstitutionComplete(id)?'complete':''}" onclick="App.goInstitution(${i})">${this.esc(b.name)}</button>`}).join('')}</div><div class="progressbar"><span style="width:${this.overallProgress()}%"></span></div><div class="survey-layout"><nav class="section-nav">${this.sectionNavHtml()}</nav><div><div class="survey-card"><div class="section-visual" style="background-image:url('${this.esc(asset.url||inst.heroUrl||'')}')"><div class="section-visual-copy"><h2>${this.esc(sec.title)}</h2><p>${this.esc(sec.subtitle||'')}</p></div></div><div class="questions">${this.state.currentSection===0?`<div class="notice" style="margin-bottom:18px"><strong>Welcome, ${this.esc(this.state.profile.name)}.</strong> You are now evaluating <strong>${this.esc(inst.name)}</strong>. Think carefully about your experiences with this institution during the past six months and rank only what you genuinely experienced. Use N/A where the instrument permits it and you have no relevant experience.</div>`:''}${sec.note?`<div class="notice">${this.esc(sec.note)}</div>`:''}${this.questionsHtml(sec,inst.institutionId)}</div></div><div class="actions"><button class="btn btn-secondary" onclick="App.prevSection()">Previous</button><button class="btn btn-primary" onclick="App.nextSection()">${this.state.currentSection===this.allSections().length-1?'Finish institution':'Next section'}</button></div>${complete?'<div class="notice" style="margin-top:16px">This institution is complete. You can review another institution tab or submit when all selected institutions are complete.</div>':''}${this.canSubmit()?`<div class="actions"><button class="btn btn-primary" onclick="App.submitAll()">Submit all completed evaluations</button></div>`:''}</div></div>`;this.autosave();},
allSections(){const context={id:'CONTEXT',title:'Your relationship with this institution',subtitle:'Banking tenure, branch frequency and channels used',imageKey:'CX_SECTION_JOURNEY',items:[['TENURE','How long have you banked with this institution?'],['BRANCH_FREQ','How often do you visit a physical branch?'],['CHANNELS','Which banking channels do you use?']]};const core=this.data.questionnaire.sections;const outcome={id:'OUTCOMES',title:'Validation Outcome Measures',subtitle:'Overall experience, satisfaction, loyalty, advocacy and switching intention',imageKey:'CX_SECTION_OUTCOMES',items:this.data.questionnaire.outcomes.flatMap(g=>g.items)};const nps={id:'NPS_GROUP',title:'Recommendation Rating',subtitle:'Net Promoter Score question',imageKey:'CX_SECTION_NPS',items:[['NPS','How likely are you to recommend this bank to a friend, relative or colleague?']]};const overall={id:'OVERALL_GROUP',title:'Overall Banking Experience Rating',subtitle:'Your overall experience',imageKey:'CX_SECTION_OVERALL',items:[['OVERALL','Using a scale from 0 to 10, where 0 means extremely poor and 10 means exceptional, how would you rate your overall experience with this bank?']]};const comments={id:'COMMENTS',title:'Tell us what happened',subtitle:'Your comments help institutions identify concrete service improvements',imageKey:'CX_SECTION_RECOVERY',items:[]};return [context].concat(core,[outcome,nps,overall,comments]);},
getSection(){return this.allSections()[this.state.currentSection]},getInst(){return this.data.institutions.find(x=>x.institutionId===this.state.selected[this.state.currentInst])},
sectionNavHtml(){return this.allSections().map((s,i)=>`<button class="${i===this.state.currentSection?'active':''}" onclick="App.goSection(${i})">${i+1}. ${this.esc(s.title)}</button>`).join('')},
questionsHtml(sec,id){if(sec.id==='CONTEXT'){const a=this.state.answers[id]||{},channels=['Branch','ATM','Mobile App','Internet Banking','WhatsApp Banking','USSD','Call Centre','Relationship Manager'];return `<div class="field"><label>How long have you banked with this institution?</label><select onchange="App.answerContext('${id}','TENURE',this.value)"><option value="">Select</option>${['Less than 1 year','1–3 years','4–6 years','7–10 years','More than 10 years'].map(v=>`<option ${a.TENURE===v?'selected':''}>${v}</option>`).join('')}</select></div><div class="field" style="margin-top:16px"><label>How often do you visit a physical branch?</label><select onchange="App.answerContext('${id}','BRANCH_FREQ',this.value)"><option value="">Select</option>${['Daily','Weekly','Monthly','Occasionally','Never'].map(v=>`<option ${a.BRANCH_FREQ===v?'selected':''}>${v}</option>`).join('')}</select></div><div class="field" style="margin-top:18px"><label>Which banking channels do you use? Select all that apply.</label><div class="bank-grid" style="grid-template-columns:repeat(2,minmax(0,1fr))">${channels.map(v=>`<label class="consent bank-card ${(a.CHANNELS||[]).includes(v)?'selected':''}"><input type="checkbox" ${(a.CHANNELS||[]).includes(v)?'checked':''} onchange="App.toggleChannel('${id}','${v}',this.checked)"> ${v}</label>`).join('')}</div></div>`}if(sec.id==='COMMENTS'){const c=this.state.comments[id]||{};return `<div class="field"><label>What worked well?</label><textarea rows="4" oninput="App.setComment('${id}','positive',this.value)">${this.esc(c.positive||'')}</textarea></div><div class="field" style="margin-top:16px"><label>What should the institution improve?</label><textarea rows="5" oninput="App.setComment('${id}','improve',this.value)">${this.esc(c.improve||'')}</textarea></div><div class="field" style="margin-top:16px"><label>Anything else you want leadership to know?</label><textarea rows="4" oninput="App.setComment('${id}','additional',this.value)">${this.esc(c.additional||'')}</textarea></div>`}return sec.items.map(it=>this.questionHtml(id,it[0],it[1],sec.id)).join('')},
questionHtml(instId,qid,prompt,group){const val=this.state.answers[instId][qid];const scale=(qid==='NPS'||qid==='OVERALL')?Array.from({length:11},(_,i)=>String(i)):['1','2','3','4','5','6','7','NA'];return `<div class="question"><div class="question-title"><span style="color:#748096">${qid}</span> ${this.esc(prompt)}</div><div class="likert ${(qid==='NPS'||qid==='OVERALL')?'scale10':''}">${scale.map(v=>`<button class="choice ${v==='NA'?'na':''} ${String(val)===v?'selected':''}" onclick="App.answer('${instId}','${qid}','${v}')">${v}</button>`).join('')}</div><div class="scale-legend"><span>${qid==='NPS'||qid==='OVERALL'?'0 — Low':'1 — Strongly disagree'}</span><span>${qid==='NPS'||qid==='OVERALL'?'10 — High':'7 — Strongly agree · N/A if not applicable'}</span></div></div>`},
answer(id,qid,v){this.state.answers[id][qid]=v;this.renderSurvey()},answerContext(id,qid,v){this.state.answers[id][qid]=v;this.autosave()},toggleChannel(id,v,checked){const arr=this.state.answers[id].CHANNELS||[];if(checked&&!arr.includes(v))arr.push(v);if(!checked){const i=arr.indexOf(v);if(i>=0)arr.splice(i,1)}this.state.answers[id].CHANNELS=arr;this.autosave()},setComment(id,k,v){this.state.comments[id][k]=v;this.autosave()},
goSection(i){this.state.currentSection=i;this.renderSurvey()},prevSection(){if(this.state.currentSection>0){this.state.currentSection--;this.renderSurvey()}else if(this.state.currentInst>0){this.state.currentInst--;this.state.currentSection=this.allSections().length-1;this.renderSurvey()}},
nextSection(){if(!this.currentSectionComplete())return this.toast('Complete this section before continuing.');if(this.state.currentSection<this.allSections().length-1){this.state.currentSection++;this.renderSurvey();return;}if(this.state.currentInst<this.state.selected.length-1){this.state.currentInst++;this.state.currentSection=0;this.renderSurvey();return;}this.renderSurvey()},
goInstitution(i){this.state.currentInst=i;this.state.currentSection=0;this.renderSurvey()},currentSectionComplete(){const sec=this.getSection();if(sec.id==='COMMENTS')return true;const a=this.state.answers[this.getInst().institutionId];if(sec.id==='CONTEXT')return !!a.TENURE&&!!a.BRANCH_FREQ&&Array.isArray(a.CHANNELS)&&a.CHANNELS.length>0;return sec.items.every(it=>a[it[0]]!==undefined&&a[it[0]]!==null&&String(a[it[0]])!=='')},
isInstitutionComplete(id){const a=this.state.answers[id]||{};return this.allSections().filter(s=>s.id!=='COMMENTS').every(s=>s.id==='CONTEXT'?(!!a.TENURE&&!!a.BRANCH_FREQ&&Array.isArray(a.CHANNELS)&&a.CHANNELS.length>0):s.items.every(it=>a[it[0]]!==undefined&&a[it[0]]!==null&&String(a[it[0]])!==''))},
canSubmit(){return this.state.selected.every(id=>this.isInstitutionComplete(id))&&this.state.selected.every(id=>this.state.visited.has(id))},overallProgress(){let total=0,done=0;this.state.selected.forEach(id=>this.allSections().filter(s=>s.id!=='COMMENTS'&&s.id!=='CONTEXT').forEach(s=>s.items.forEach(it=>{total++;if(this.state.answers[id]&&this.state.answers[id][it[0]]!==undefined)done++})));return total?Math.round(done/total*100):0},
autosave(){if(!this.state.sessionId)return;clearTimeout(this.saveTimer);this.saveTimer=setTimeout(()=>{let badge=document.getElementById('autosaveBadge');if(!badge){document.body.insertAdjacentHTML('beforeend',`<div id="autosaveBadge" class="autosave-badge"><div class="autosave-dot"></div><span id="autosaveText">Draft saving…</span></div>`);badge=document.getElementById('autosaveBadge');}badge.style.opacity='1';document.getElementById('autosaveText').textContent='Draft saving…';google.script.run.withSuccessHandler(()=>{document.getElementById('autosaveText').textContent='Draft auto-saved';setTimeout(()=>{if(badge)badge.style.opacity='0';},1500);}).withFailureHandler(()=>{document.getElementById('autosaveText').textContent='Draft save failed';}).saveDraft(this.state.sessionId,{answers:this.state.answers,comments:this.state.comments},Array.from(this.state.visited),this.state.currentInst)},1000)},
submitAll(){if(!this.canSubmit())return this.toast('Complete and visit every selected institution before submitting.');const payload={institutions:this.state.selected.map(id=>({institutionId:id,answers:this.state.answers[id],comments:this.state.comments[id]}))};google.script.run.withSuccessHandler(r=>this.renderResults(r)).withFailureHandler(this.fail).submitSurvey(this.state.sessionId,payload)},
renderResults(r){this.setStep(4);const cards=r.results.map(x=>`<div class="panel" style="margin-bottom:20px"><h2 class="section-title">${this.esc(x.institutionName)}</h2><div class="result-grid"><div class="metric"><small>Your BCXI-Ghana score</small><div class="big">${x.bcxiScore==null?'—':x.bcxiScore.toFixed(1)}</div><small>0–100 index · ${x.validSections}/10 valid sub-indices</small></div><div class="metric"><small>Your recommendation rating</small><div class="big">${x.npsRating==null?'—':x.npsRating}</div><small>${this.esc(x.npsClass||'')}</small></div><div class="metric"><small>Institution benchmark</small><div class="big">${x.benchmark.available&&x.benchmark.bcxiAverage!=null?x.benchmark.bcxiAverage.toFixed(1):'—'}</div><small>${x.benchmark.available?'Aggregate BCXI · n='+x.benchmark.sampleSize:'Available after '+x.benchmark.minRequired+' responses · current n='+x.benchmark.sampleSize}</small></div></div><div class="score-list">${Object.keys(x.sectionScores).map(k=>{const s=x.sectionScores[k];const bench=x.benchmark.sectionAverages?x.benchmark.sectionAverages[k]:null;return `<div class="score-row"><span>${this.esc(s.title)}</span><div class="bar"><span style="width:${s.score==null?0:s.score}%"></span></div><strong>${s.score==null?'N/A':s.score.toFixed(1)}</strong>${x.benchmark.available&&bench!=null?`<small style="grid-column:1/-1;color:#748096">Institution aggregate: ${Number(bench).toFixed(1)}</small>`:''}</div>`}).join('')}</div></div>`).join('');document.getElementById('stage').innerHTML=`<div><h2 class="section-title">Your experience benchmark</h2><p class="section-lead">Thank you. The dashboard below summarises the ten experience dimensions. Institutional benchmarks appear only after the configured minimum sample is reached.</p>${cards}</div>`;window.scrollTo({top:0,behavior:'smooth'})},
esc(s){return String(s==null?'':s).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))},toast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.remove('hidden');setTimeout(()=>e.classList.add('hidden'),3500)},fail(e){App.toast(e&&e.message?e.message:String(e))}}
App.init();
</script>
