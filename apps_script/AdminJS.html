<script>
const Admin={token:null,data:null,
init(){this.renderLogin()},renderLogin(){document.getElementById('adminRoot').innerHTML=`<main class="main" style="max-width:560px;padding-top:12vh"><div class="panel"><h1 class="section-title">Institution Admin Portal</h1><p class="section-lead">Sign in with an authorised email. A one-time verification code will be sent to that address.</p><div class="field"><label>Email</label><input id="adminEmail" type="email"></div><div id="otpBox" class="hidden" style="margin-top:16px"><div class="field"><label>Verification code</label><input id="otpCode" inputmode="numeric"></div></div><div class="actions"><button id="sendOtpBtn" class="btn btn-primary" onclick="Admin.requestOtp()">Send code</button><button id="verifyBtn" class="btn btn-primary hidden" onclick="Admin.verifyOtp()">Verify and sign in</button></div></div></main>`},
requestOtp(){const email=document.getElementById('adminEmail').value.trim();google.script.run.withSuccessHandler(()=>{document.getElementById('otpBox').classList.remove('hidden');document.getElementById('verifyBtn').classList.remove('hidden');document.getElementById('sendOtpBtn').textContent='Resend code';this.toast('Verification code sent.')}).withFailureHandler(this.fail).requestAdminOtp(email)},
verifyOtp(){const email=document.getElementById('adminEmail').value.trim(),code=document.getElementById('otpCode').value.trim();google.script.run.withSuccessHandler(r=>{this.token=r.token;this.load()}).withFailureHandler(this.fail).verifyAdminOtp(email,code)},
load(){google.script.run.withSuccessHandler(d=>{this.data=d;this.renderDashboard()}).withFailureHandler(this.fail).getAdminPortalData(this.token,{})},
renderDashboard(){const d=this.data;document.getElementById('adminRoot').innerHTML=`<div class="admin-shell"><aside class="admin-side"><div class="brand"><div class="brand-mark"></div><div><strong>BCXI-Ghana</strong><small>Institution Admin</small></div></div><h3 style="margin-top:36px">${this.esc(d.profile.name||d.profile.email)}</h3><p style="opacity:.7;font-size:13px">${this.esc(d.profile.role)}</p><button class="btn btn-secondary" style="width:100%;margin-top:18px" onclick="Admin.openAudit()">Request CX Audit</button></aside><main class="admin-main"><h1 class="section-title">Customer feedback intelligence</h1><p class="section-lead">Recent customer comments for the institutions assigned to your account.</p><div class="result-grid">${d.institutions.map(i=>{const b=d.benchmarks[i.institutionId]||{};return `<div class="metric"><small>${this.esc(i.name)}</small><div class="big">${b.bcxiAverage==null?'—':Number(b.bcxiAverage).toFixed(1)}</div><small>${b.sampleSize||0} submissions · aggregate NPS ${b.nps==null?'—':b.nps}</small></div>`}).join('')}</div><h2 style="margin-top:28px">Customer comments</h2><div class="comment-list">${d.comments.length?d.comments.map(c=>`<div class="comment-card" onclick="Admin.openComment('${c.submissionId}')"><div class="comment-meta"><span>${this.esc(c.institutionName)} · ${this.esc(c.topic)}</span><span>${this.esc(c.createdAt)}</span></div><div class="comment-body">${this.esc(c.body)}</div><div class="comment-meta" style="margin-top:10px"><span>${this.esc(c.name)} · ${this.esc(c.email)} · ${this.esc(c.phone)}</span><span>BCXI ${c.bcxiScore==null?'—':c.bcxiScore}</span></div></div>`).join(''):'<div class="panel">No comments yet.</div>'}</div></main></div>`},
openComment(id){google.script.run.withSuccessHandler(x=>{const thread=x.comments.map(c=>`<div style="padding:12px;border-bottom:1px solid #eee"><strong>${this.esc(c.topic||c.authorType)}</strong><p>${this.esc(c.body)}</p><small>${this.esc(c.authorType)} · ${this.esc(c.createdAt)}</small></div>`).join('');document.body.insertAdjacentHTML('beforeend',`<div id="modal" class="modal"><div class="modal-card"><button class="btn btn-secondary" style="float:right" onclick="document.getElementById('modal').remove()">Close</button><h2>${this.esc(x.institutionName)}</h2><p><strong>${this.esc(x.respondent.name)}</strong><br>${this.esc(x.respondent.email)} · ${this.esc(x.respondent.phone)}</p><p>BCXI: <strong>${x.bcxiScore==null?'—':x.bcxiScore}</strong> · NPS rating: ${this.esc(x.npsRating)} · Overall: ${this.esc(x.overallRating)}</p><h3>Comment thread</h3>${thread}${x.respondent.contactConsent?`<hr><div class="field"><label>Email subject</label><input id="replySubject" value="Following up on your customer experience feedback"></div><div class="field" style="margin-top:12px"><label>Message</label><textarea id="replyBody" rows="7"></textarea></div><div class="actions"><button class="btn btn-primary" onclick="Admin.sendReply('${x.submissionId}')">Send email to customer</button></div>`:'<div class="notice">This customer did not grant follow-up consent. Direct email is disabled.</div>'}</div></div>`)}).withFailureHandler(this.fail).getSubmissionDetail(this.token,id)},
sendReply(id){const subject=document.getElementById('replySubject').value,body=document.getElementById('replyBody').value;google.script.run.withSuccessHandler(()=>this.toast('Email sent and logged.')).withFailureHandler(this.fail).adminSendCustomerEmail(this.token,id,subject,body)},
openAudit(){const areas=this.data.auditAreas;document.body.insertAdjacentHTML('beforeend',`<div id="modal" class="modal"><div class="modal-card"><button class="btn btn-secondary" style="float:right" onclick="document.getElementById('modal').remove()">Close</button><h2>Request Customer Experience Audit</h2><div class="field"><label>Institution</label><select id="auditInstitution">${this.data.institutions.map(i=>`<option value="${i.institutionId}">${this.esc(i.name)}</option>`).join('')}</select></div><div style="margin-top:16px">${areas.map(a=>`<label class="consent" style="margin:8px 0"><input type="checkbox" name="auditArea" value="${a.id}: ${this.esc(a.title)}"> ${this.esc(a.title)}</label>`).join('')}</div><div class="field" style="margin-top:16px"><label>What help do you need?</label><textarea id="auditNote" rows="6"></textarea></div><div class="actions"><button class="btn btn-primary" onclick="Admin.submitAudit()">Send audit request</button></div></div></div>`)},
submitAudit(){const institutionId=document.getElementById('auditInstitution').value,areas=Array.from(document.querySelectorAll('input[name=auditArea]:checked')).map(x=>x.value),note=document.getElementById('auditNote').value;google.script.run.withSuccessHandler(()=>{document.getElementById('modal').remove();this.toast('Audit request sent.')}).withFailureHandler(this.fail).requestCxAudit(this.token,institutionId,areas,note)},
esc(s){return String(s==null?'':s).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))},toast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.remove('hidden');setTimeout(()=>e.classList.add('hidden'),3500)},fail(e){Admin.toast(e&&e.message?e.message:String(e))}}
Admin.init();
</script>
