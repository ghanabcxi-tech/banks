<script>
const Admin={token:null,data:null,activeFilters:{},
init(){this.renderLogin()},
renderLogin(){document.getElementById('adminRoot').innerHTML=`<main class="main" style="max-width:560px;padding-top:12vh"><div class="panel"><h1 class="section-title">Institution Admin Portal</h1><p class="section-lead">Sign in with an authorised email. A one-time verification code will be sent to that address.</p><div class="field"><label>Email</label><input id="adminEmail" type="email"></div><div id="otpBox" class="hidden" style="margin-top:16px"><div class="field"><label>Verification code</label><input id="otpCode" inputmode="numeric"></div></div><div class="actions"><button id="sendOtpBtn" class="btn btn-primary" onclick="Admin.requestOtp()">Send code</button><button id="verifyBtn" class="btn btn-primary hidden" onclick="Admin.verifyOtp()">Verify and sign in</button></div></div></main>`},
requestOtp(){const email=document.getElementById('adminEmail').value.trim();google.script.run.withSuccessHandler(()=>{document.getElementById('otpBox').classList.remove('hidden');document.getElementById('verifyBtn').classList.remove('hidden');document.getElementById('sendOtpBtn').textContent='Resend code';this.toast('Verification code sent.')}).withFailureHandler(this.fail).requestAdminOtp(email)},
verifyOtp(){const email=document.getElementById('adminEmail').value.trim(),code=document.getElementById('otpCode').value.trim();google.script.run.withSuccessHandler(r=>{this.token=r.token;this.load()}).withFailureHandler(this.fail).verifyAdminOtp(email,code)},
load(){google.script.run.withSuccessHandler(d=>{this.data=d;this.renderDashboard()}).withFailureHandler(this.fail).getAdminPortalData(this.token,this.activeFilters)},
renderDashboard(){const d=this.data,isSuper=(d.profile.role==='SUPER_ADMIN'||d.profile.role==='DEVELOPER_ADMIN');
document.getElementById('adminRoot').innerHTML=`<div class="admin-shell"><aside class="admin-side"><div class="brand"><div class="brand-mark"></div><div><strong>BCXI-Ghana</strong><small>${isSuper?'Super Admin':'Institution Admin'}</small></div></div><h3 style="margin-top:36px;font-size:16px">${this.esc(d.profile.name||d.profile.email)}</h3><p style="opacity:.7;font-size:12px">${this.esc(d.profile.role)}</p><div style="margin-top:30px"><label style="font-size:11px;font-weight:bold;text-transform:uppercase;color:#a0aec0">Filters</label><div class="field" style="margin-top:10px"><label style="color:#fff;font-size:12px">Bank</label><select id="filterInst" style="padding:8px;background:rgba(255,255,255,0.15);color:#fff;border:1px solid rgba(255,255,255,0.25)" onchange="Admin.applyFilter('institutionId',this.value)"><option value="" style="color:#000">All Banks</option>${d.institutions.map(i=>`<option value="${i.institutionId}" ${Admin.activeFilters.institutionId===i.institutionId?'selected':''} style="color:#000">${this.esc(i.name)}</option>`).join('')}</select></div>
${isSuper?`<div class="field" style="margin-top:12px"><label style="color:#fff;font-size:12px">Status</label><select id="filterStatus" style="padding:8px;background:rgba(255,255,255,0.15);color:#fff;border:1px solid rgba(255,255,255,0.25)" onchange="Admin.applyFilter('status',this.value)"><option value="" style="color:#000">All Statuses</option><option value="SUBMITTED" ${Admin.activeFilters.status==='SUBMITTED'?'selected':''} style="color:#000">Submitted (New)</option><option value="PUBLISHED_TO_BANK" ${Admin.activeFilters.status==='PUBLISHED_TO_BANK'?'selected':''} style="color:#000">Published to Bank</option><option value="CLOSED" ${Admin.activeFilters.status==='CLOSED'?'selected':''} style="color:#000">Resolved / Closed</option></select></div>`:''}</div><button class="btn btn-secondary" style="width:100%;margin-top:32px" onclick="Admin.openAudit()">Request CX Audit</button></aside><main class="admin-main"><h1 class="section-title">Customer feedback intelligence</h1><p class="section-lead">Recent customer feedback and scoring records.</p><div class="result-grid">${d.institutions.map(i=>{const b=d.benchmarks[i.institutionId]||{};return `<div class="metric"><small>${this.esc(i.name)}</small><div class="big">${b.bcxiAverage==null?'—':Number(b.bcxiAverage).toFixed(1)}</div><small>${b.sampleSize||0} submissions · aggregate NPS ${b.nps==null?'—':b.nps}</small></div>`}).join('')}</div><h2 style="margin-top:28px">${isSuper?'Customer complaints (Original)':'Published customer feedback'}</h2><div class="comment-list">${d.comments.length?d.comments.map(c=>{
const badgeStyle=c.status==='SUBMITTED'?'background:#ffe5e5;color:#b42318;border:1px solid #ffd0d0':(c.status==='PUBLISHED_TO_BANK'||c.status==='ACKNOWLEDGED'?'background:#fff7e5;color:#6e4b00;border:1px solid #f2dda8':'background:#eefdf7;color:#147d64;border:1px solid #c2f3e1');
return `<div class="comment-card" onclick="Admin.openComment('${c.submissionId}')"><div class="comment-meta"><span><strong>${this.esc(c.institutionName)}</strong> · ${this.esc(c.topic)}</span><span class="step" style="padding:4px 8px;font-size:11px;border-radius:6px;margin-bottom:0;${badgeStyle}">${this.esc(c.status)}</span></div><div class="comment-body" style="font-size:14px;color:#2d3748;margin:12px 0">${this.esc(c.body)}</div><div class="comment-meta"><span>${isSuper?`${this.esc(c.name)} · ${this.esc(c.email)} · ${this.esc(c.phone)} · consent=${c.contactConsent}`:`Reference: ${this.esc(c.commentId.slice(0,8))}`}</span><span>Score BCXI: <strong>${c.bcxiScore==null?'—':c.bcxiScore.toFixed(1)}</strong> · ${this.esc(c.createdAt.slice(0,10))}</span></div></div>`}).join(''):'<div class="panel">No feedback found.</div>'}</div></main></div>`},
applyFilter(key,val){if(val===''){delete this.activeFilters[key]}else{this.activeFilters[key]=val}this.load()},
openComment(id){const isSuper=(this.data.profile.role==='SUPER_ADMIN'||this.data.profile.role==='DEVELOPER_ADMIN');
google.script.run.withSuccessHandler(x=>{
const thread=x.comments.map(c=>{
const moderationForm=(isSuper && c.status==='SUBMITTED')?`<div style="margin-top:12px;background:#f7fafc;padding:12px;border-radius:10px;border:1px solid var(--line)"><label style="font-size:12px;font-weight:bold">Complaint Moderation & Publication</label><textarea id="modBody_${c.complaintId}" rows="3" style="width:100%;margin-top:6px;padding:8px;font-size:13px">${this.esc(c.body)}</textarea><div class="actions" style="margin-top:8px"><button class="btn btn-primary" style="padding:6px 12px;font-size:12px;border-radius:8px" onclick="event.stopPropagation();Admin.publishComplaint('${c.complaintId}')">Publish to Bank</button></div></div>`:((c.published)?`<div style="font-size:11px;color:#4a5568;margin-top:4px">✓ Published to bank</div>`:'');
const bankActionBox=(!isSuper && c.publicationId)?`<hr style="border:0;border-top:1px solid #e2e8f0;margin:12px 0"><div style="background:#f7fafc;padding:12px;border-radius:10px;border:1px solid var(--line)"><label style="font-size:12px;font-weight:bold">Internal Bank Action Log</label><div class="field" style="margin-top:6px"><label style="font-size:11px">Investigation Status</label><select id="actionStatus_${c.publicationId}" style="padding:6px;font-size:13px"><option value="PUBLISHED_TO_BANK" ${c.status==='PUBLISHED_TO_BANK'?'selected':''}>Published (New)</option><option value="ACKNOWLEDGED" ${c.status==='ACKNOWLEDGED'?'selected':''}>Acknowledged</option><option value="IN_ACTION" ${c.status==='IN_ACTION'?'selected':''}>Investigation In-Progress</option><option value="ACTION_RECORDED" ${c.status==='ACTION_RECORDED'?'selected':''}>Action Taken</option><option value="CLOSED" ${c.status==='CLOSED'?'selected':''}>Resolved / Closed</option></select></div><div class="field" style="margin-top:8px"><label style="font-size:11px">Add Action Note / Note on Resolution</label><textarea id="actionNote_${c.publicationId}" rows="2" style="width:100%;padding:6px;font-size:13px"></textarea></div><div class="actions" style="margin-top:8px"><button class="btn btn-primary" style="padding:6px 12px;font-size:12px;border-radius:8px" onclick="event.stopPropagation();Admin.updateAction('${c.publicationId}')">Save Action Status</button></div></div>`:((!isSuper && c.actionNotes && c.actionNotes.length)?`<div style="margin-top:8px;padding-left:12px;border-left:2px solid var(--blue)"><strong>Action Notes:</strong>${c.actionNotes.map(n=>`<p style="margin:4px 0;font-size:12px"><em>${n.createdAt.slice(0,10)} - ${this.esc(n.author)}</em>: ${this.esc(n.note)}</p>`).join('')}</div>`:'');
return `<div style="padding:12px 0;border-bottom:1px solid #edf2f7"><div style="display:flex;justify-content:space-between;font-size:12px;color:var(--muted)"><strong>${this.esc(c.topic)}</strong><span>Status: ${c.status}</span></div><p style="margin:6px 0;line-height:1.5;font-size:14px">${this.esc(c.body)}</p><small style="color:var(--muted)">Submitted: ${this.esc(c.createdAt.slice(0,16))}</small>${moderationForm}${bankActionBox}</div>`}).join('');

document.body.insertAdjacentHTML('beforeend',`<div id="modal" class="modal"><div class="modal-card"><button class="btn btn-secondary" style="float:right" onclick="document.getElementById('modal').remove()">Close</button><h2>${this.esc(x.institutionName)}</h2><p style="color:var(--muted);font-size:13px"><strong>Respondent name:</strong> ${this.esc(x.respondent.name)}<br><strong>Contact:</strong> ${this.esc(x.respondent.email)} · ${this.esc(x.respondent.phone)}</p><p>BCXI Score: <strong>${x.bcxiScore==null?'—':x.bcxiScore.toFixed(1)}</strong> · NPS rating: ${this.esc(x.npsRating)} · Overall Rating: ${this.esc(x.overallRating)}</p><h3 style="margin-top:20px;border-bottom:2px solid #e2e8f0;padding-bottom:6px">Feedback Threads</h3>${thread}${isSuper&&x.respondent.contactConsent?`<hr style="border:0;border-top:1px solid #e2e8f0;margin:20px 0"><h3>Orchestrate follow-up communication</h3><div class="field"><label>Email subject</label><input id="replySubject" value="Following up on your customer experience feedback"></div><div class="field" style="margin-top:12px"><label>Message</label><textarea id="replyBody" rows="5"></textarea></div><div class="actions"><button class="btn btn-primary" onclick="Admin.sendReply('${x.submissionId}')">Send email to customer</button></div>`:''}</div></div>`)}).withFailureHandler(this.fail).getSubmissionDetail(this.token,id)},
publishComplaint(complaintId){const moderatedBody=document.getElementById('modBody_'+complaintId).value.trim();if(!moderatedBody)return this.toast('Moderated body cannot be empty.');google.script.run.withSuccessHandler(()=>{document.getElementById('modal').remove();this.toast('Complaint published to bank.');this.load()}).withFailureHandler(this.fail).publishComplaintToBank(this.token,complaintId,moderatedBody)},
updateAction(publicationId){const status=document.getElementById('actionStatus_'+publicationId).value,note=document.getElementById('actionNote_'+publicationId).value.trim();google.script.run.withSuccessHandler(()=>{document.getElementById('modal').remove();this.toast('Action log updated.');this.load()}).withFailureHandler(this.fail).updateBankAction(this.token,publicationId,status,note)},
sendReply(id){const subject=document.getElementById('replySubject').value,body=document.getElementById('replyBody').value;google.script.run.withSuccessHandler(()=>this.toast('Email sent and logged.')).withFailureHandler(this.fail).adminSendCustomerEmail(this.token,id,subject,body)},
openAudit(){const areas=this.data.auditAreas;document.body.insertAdjacentHTML('beforeend',`<div id="modal" class="modal"><div class="modal-card"><button class="btn btn-secondary" style="float:right" onclick="document.getElementById('modal').remove()">Close</button><h2>Request Customer Experience Audit</h2><div class="field"><label>Institution</label><select id="auditInstitution">${this.data.institutions.map(i=>`<option value="${i.institutionId}">${this.esc(i.name)}</option>`).join('')}</select></div><div style="margin-top:16px">${areas.map(a=>`<label class="consent" style="margin:8px 0"><input type="checkbox" name="auditArea" value="${a.id}: ${this.esc(a.title)}"> ${this.esc(a.title)}</label>`).join('')}</div><div class="field" style="margin-top:16px"><label>What help do you need?</label><textarea id="auditNote" rows="6"></textarea></div><div class="actions"><button class="btn btn-primary" onclick="Admin.submitAudit()">Send audit request</button></div></div></div>`)},
submitAudit(){const institutionId=document.getElementById('auditInstitution').value,areas=Array.from(document.querySelectorAll('input[name=auditArea]:checked')).map(x=>x.value),note=document.getElementById('auditNote').value;google.script.run.withSuccessHandler(()=>{document.getElementById('modal').remove();this.toast('Audit request sent.')}).withFailureHandler(this.fail).requestCxAudit(this.token,institutionId,areas,note)},
esc(s){return String(s==null?'':s).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))},toast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.remove('hidden');setTimeout(()=>e.classList.add('hidden'),3500)},fail(e){Admin.toast(e&&e.message?e.message:String(e))}}
Admin.init();
</script>
